---
- name:   
  hosts: pipeline
  become: yes
  tasks:
   - name: Install nginx
     apt:
      name: nginx
      state: present
      update_cache: yes
  
   - name: copy website
     copy:
       src: index.html
       dest: /var/www/html/index.html
     notify: Restart nginx

  handlers:
   - name: Restart nginx
     service: 
      name: nginx
      state: restarted
      enable: yes

